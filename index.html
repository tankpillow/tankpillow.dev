<!DOCTYPE html>

        <link rel="stylesheet" type="text/css" href="css/style.css">
        <style>
            body {
                background-color: #333333;
                font-family: Arial, sans-serif;
                color: white;
            }
            a {
                color: #00ff00;
                text-decoration: underline;
            }
            .centerDamnit {
                display: block;
                margin-left: auto;
                margin-right: auto;
            }
            #flashbang {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                opacity: 0;
                transition: opacity 0.5s ease-in-out;
                z-index: 999;
            }
            #white {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                opacity: 0;
                transition: opacity 5s ease-in-out;
                background-color: white;
                z-index: 9999;
            }
        </style>
    </head>
    <body>
        <div class="navbar">
            <a class="item-active" href="index.html">Home</a>
        </div>
        <div class="content">
            <br>

            <img id="flashbang" src="imgs/flashbang.png">
            <img id="white" src="imgs/white.png">
            <img class="centerDamnit" src="imgs/profile.jpg" alt="A photo of my channel... tell your browser to be better to load the image." width="128px" height="128px" style="cursor: pointer;">

                </li>
                <li>
                    <a target="_blank" href="https://www.youtube.com/watch?v=9sqOID_OH7E">OnlyFans</a>

    <script>
        var profilePicture = document.querySelector('.centerDamnit');
        var flashbang = document.querySelector('#flashbang');
        var white = document.querySelector('#white');

        // Initial setup for elements
        flashbang.style.opacity = '0';
        white.style.opacity = '0';
        flashbang.style.display = 'none';
        white.style.display = 'none';
            
        profilePicture.addEventListener('click', function () {
            // Show flashbang and animate opacity
            flashbang.style.display = 'block';
            setTimeout(function () {
                flashbang.style.opacity = '1';
            }, 500);

            setTimeout(function () {
                flashbang.style.display = 'none';
                
                // show white and allow it to fade out.
                white.style.display = 'block';
                white.style.opacity = '1';

                setTimeout(function () {
                    white.style.opacity = '0';

                    setTimeout(function () {
                        white.style.display = 'none';
                    }, 5000);
                }, 3000);
            }, 2000);
        });
    </script>

</html>
